version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: hostpanel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - hostpanel_pg:/var/lib/postgresql/data

volumes:
  hostpanel_pg:
